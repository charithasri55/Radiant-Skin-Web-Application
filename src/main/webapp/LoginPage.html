<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - Radiant Skin</title>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
<style>
@import
	url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap")
	;

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: "Poppins", sans-serif;
}

body {
	display: flex;
	align-items: center;
	justify-content: center;
	height: 100vh;
	padding: 15px;
	background: linear-gradient(to right, #e0f7fa, #f9fbe7);
	min-height: 100vh;
	overflow: hidden;
}

.wrapper {
	max-width: 500px;
	width: 100%;
	background: #fff;
	border-radius: 5px;
	box-shadow: 0px 4px 10px 1px rgba(0, 0, 0, 0.1);
}

.wrapper .title {
	height: 120px;
	background: black;
	border-radius: 5px 5px 0 0;
	color: #fff;
	font-size: 30px;
	font-weight: 600;
	display: flex;
	align-items: center;
	justify-content: center;
}

.wrapper form {
	padding: 25px 35px;
}

.wrapper form .row {
	height: 60px;
	margin-top: 15px;
	position: relative;
}

.wrapper form .row input {
	height: 100%;
	width: 100%;
	outline: none;
	padding-left: 70px;
	border-radius: 5px;
	border: 1px solid lightgrey;
	font-size: 18px;
	transition: all 0.3s ease;
}

form .row input:focus {
	border-color: black;
}

form .row input::placeholder {
	color: #999;
}

.wrapper form .row i {
	position: absolute;
	width: 55px;
	height: 100%;
	color: #fff;
	font-size: 22px;
	background: black;
	border: 1px solid black;
	border-radius: 5px 0 0 5px;
	display: flex;
	align-items: center;
	justify-content: center;
}

.wrapper form .pass {
	margin-top: 12px;
}

.wrapper form .pass a {
	color: black;
	font-size: 17px;
	text-decoration: none;
}

.wrapper form .pass a:hover {
	text-decoration: underline;
}

.wrapper form .button input {
	margin-top: 20px;
	color: #fff;
	font-size: 20px;
	font-weight: 500;
	padding-left: 0px;
	background: black;
	border: 1px solid black;
	cursor: pointer;
}

form .button input:hover {
	background: #333;
}

.wrapper form .signup-link {
	text-align: center;
	margin-top: 45px;
	font-size: 17px;
}

.wrapper form .signup-link a {
	color: black;
	text-decoration: none;
}

form .signup-link a:hover {
	text-decoration: underline;
}

.alert {
	margin: 10px 35px 0;
	padding: 10px 14px;
	border-radius: 5px;
	font-size: 14px;
	font-weight: 500;
}

.alert-error {
	background: #ffe6e6;
	color: #c0392b;
	border: 1px solid #f5c6cb;
}

.alert-success {
	background: #e6f9ee;
	color: #1e8449;
	border: 1px solid #b7dfbf;
}
</style>
</head>
<body>
	<div class="wrapper">
		<div class="title">
			<span>Login Form</span>
		</div>

		<!-- Alert box -->
		<div id="alertBox" style="display: none;" class="alert"></div>

		<form action="login" method="post">
			<div class="row">
				<i class="fas fa-user"></i> <input name="email" id="email"
					type="text" placeholder="Email" required />
			</div>
			<div class="row">
				<i class="fas fa-lock"></i> <input name="password" id="password"
					type="password" placeholder="Password" required />
			</div>
			<div class="pass">
				<a href="#">Forgot password?</a>
			</div>
			<div class="row button">
				<input type="submit" value="Login" />
			</div>
			<div class="signup-link">
				Not a member? <a href="reg.html">Signup now</a>
			</div>
		</form>
	</div>

	<script>
		(function() {
			const params = new URLSearchParams(window.location.search);
			const error = params.get('error');
			const success = params.get('registered');
			const box = document.getElementById('alertBox');

			if (error) {
				box.textContent = decodeURIComponent(error);
				box.className = 'alert alert-error';
				box.style.display = 'block';
			} else if (success === 'true') {
				box.textContent = 'Registration successful! Please login.';
				box.className = 'alert alert-success';
				box.style.display = 'block';
			}
		})();
	</script>
</body>
</html>
