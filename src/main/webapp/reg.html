<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Radiant Skin</title>
<style>
@import
	url('https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap')
	;

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: 'Poppins', sans-serif;
}

body {
	min-height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	background: linear-gradient(to right, #e0f7fa, #f9fbe7);
}

.wrapper {
	position: relative;
	max-width: 430px;
	width: 100%;
	background: #fff;
	padding: 34px;
	border-radius: 6px;
	box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
}

.wrapper h2 {
	position: relative;
	font-size: 22px;
	font-weight: 600;
	color: #333;
}

.wrapper h2::before {
	content: '';
	position: absolute;
	left: 0;
	bottom: 0;
	height: 3px;
	width: 28px;
	border-radius: 12px;
	background: #4070f4;
}

.wrapper form {
	margin-top: 30px;
}

.wrapper form .input-box {
	height: 52px;
	margin: 18px 0;
}

form .input-box input {
	height: 100%;
	width: 100%;
	outline: none;
	padding: 0 15px;
	font-size: 17px;
	font-weight: 400;
	color: #333;
	border: 1.5px solid #C7BEBE;
	border-bottom-width: 2.5px;
	border-radius: 6px;
	transition: all 0.3s ease;
}

.input-box input:focus, .input-box input:valid {
	border-color: black;
}

form .policy {
	display: flex;
	align-items: center;
}

form h3 {
	color: #707070;
	font-size: 14px;
	font-weight: 500;
	margin-left: 10px;
}

.input-box.button input {
	color: #fff;
	letter-spacing: 1px;
	border: none;
	background: black;
	cursor: pointer;
}

.input-box.button input:hover {
	background: #505050;
}

form .text h3 {
	color: #333;
	width: 100%;
	text-align: center;
}

form .text h3 a {
	color: #4070f4;
	text-decoration: none;
}

form .text h3 a:hover {
	text-decoration: underline;
}

.alert {
	padding: 10px 14px;
	border-radius: 5px;
	margin-bottom: 15px;
	font-size: 14px;
	font-weight: 500;
}

.alert-error {
	background: #ffe6e6;
	color: #c0392b;
	border: 1px solid #f5c6cb;
}

.alert-success {
	background: #e6f9ee;
	color: #1e8449;
	border: 1px solid #b7dfbf;
}
</style>
</head>
<body>
	<div class="wrapper">
		<h2>Registration</h2>

		<!-- Dynamic alert area -->
		<div id="alertBox" style="display: none;" class="alert"></div>

		<form action="register" method="post">
			<div class="input-box">
				<input type="text" name="name" placeholder="Name" required />
			</div>
			<div class="input-box">
				<input type="email" name="email" placeholder="Email" required />
			</div>
			<div class="input-box">
				<input type="password" name="password" placeholder="Password"
					required />
			</div>
			<div class="policy">
				<input type="checkbox" required>
				<h3>I accept all terms &amp; condition</h3>
			</div>
			<div class="input-box button">
				<input type="submit" value="Register" />
			</div>
			<div class="text">
				<h3>
					Already have an account? <a href="LoginPage.html">Login</a>
				</h3>
			</div>
		</form>
	</div>

	<script>
		// Show error or success message from URL params
		(function() {
			const params = new URLSearchParams(window.location.search);
			const error = params.get('error');
			const success = params.get('registered');
			const box = document.getElementById('alertBox');

			if (error) {
				box.textContent = decodeURIComponent(error);
				box.className = 'alert alert-error';
				box.style.display = 'block';
			} else if (success === 'true') {
				box.textContent = 'Registration successful! Please login.';
				box.className = 'alert alert-success';
				box.style.display = 'block';
			}
		})();
	</script>
</body>
</html>
